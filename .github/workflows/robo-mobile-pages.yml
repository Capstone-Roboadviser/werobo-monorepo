name: Deploy robo_mobile to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/robo-mobile-pages.yml
      - Front-End/robo_mobile/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: robo-mobile-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Front-End/robo_mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.3
          channel: stable
          cache: true

      - name: Build web app
        env:
          WEB_BASE_HREF: /${{ github.event.repository.name }}/
        run: bash scripts/build_web.sh

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Front-End/robo_mobile/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
